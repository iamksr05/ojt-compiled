<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1><span class="bi bi-list-task"> </span>Kanban Task Board</h1>
        <button id="add-task-btn">+ Add Task</button>
    </header>

    <main class="board">
        <div class="left-workspace">
            <section class="col" id="todo-col">
                <h2>To-Do</h2>
                <div class="task-container" id="todo-tasks"></div>
            </section>

            <section class="col" id="current-col">
                <h2>Current Task</h2>
                <div class="task-container" id="current-tasks"></div>
            </section>
        </div>

        <section class="col" id="completed-col">
            <h2>Completed</h2>
            <div class="task-container" id="completed-tasks"></div>
        </section>
    </main>
    
    <script src="storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
